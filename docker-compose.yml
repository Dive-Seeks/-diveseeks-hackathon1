version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-divepos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-divepos}
      POSTGRES_DB: ${DB_NAME:-divepos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-divepos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 7771
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-divepos}
      DB_PASSWORD: ${DB_PASSWORD:-divepos}
      DB_NAME: ${DB_NAME:-divepos}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - agents_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7771/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  container-supervisor:
    build:
      context: .
      dockerfile: Dockerfile.supervisor
    restart: unless-stopped
    environment:
      SUPERVISOR_API_KEY: ${SUPERVISOR_API_KEY}
      SUPERVISOR_PORT: 18800
      HERMES_AGENT_IMAGE: ${HERMES_AGENT_IMAGE}
      HERMES_AGENT_API_PORT: ${HERMES_AGENT_API_PORT:-8642}
      HERMES_AGENT_NETWORK: dive_pos_agents_internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      # gid of /var/run/docker.sock on the host: stat -c '%g' /var/run/docker.sock
      - "${DOCKER_GID:-999}"
    ports:
      # localhost-only, for dev where the backend runs on the host via nodemon
      - "127.0.0.1:18800:18800"
    networks:
      - default
      - agents_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 7777
      NEXT_PUBLIC_API_URL: /api
      API_PROXY_TARGET: http://backend:7771
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - frontend

  open-design:
    build:
      context: .
      dockerfile: Dockerfile.open-design
    restart: unless-stopped
    ports:
      - "17573:17573"
    volumes:
      - open_design_data:/data
    environment:
      OD_DATA_DIR: /data
      OD_BIND_HOST: 0.0.0.0
      OD_PORT: "17573"
      OD_API_TOKEN: ${OD_API_TOKEN}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:17573/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  nginx_certs:
  open_design_data:

networks:
  default:
  agents_internal:
    internal: true
