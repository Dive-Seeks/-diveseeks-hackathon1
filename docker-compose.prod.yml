version: "3.9"
# ─────────────────────────────────────────────────────────────────────────────
# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-divepos}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-divepos}
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256m

  backend:
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # These override backend/.env — docker-compose service names for DB/Redis
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_ENABLED: "false"
      SANDBOX_MODE: mock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./credentials:/app/credentials:ro
      - backend_uploads:/app/uploads
      - backend_memory:/app/memory
    deploy:
      resources:
        limits:
          memory: 2g

  frontend:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      API_PROXY_TARGET: http://backend:7771
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
    deploy:
      resources:
        limits:
          memory: 1g

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_certbot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  backend_uploads:
  backend_memory:
  nginx_certbot:
